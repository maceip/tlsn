name: tee

on:
  push:
    branches: [ "quote-presentation-ci" ]
  pull_request:
    branches: [ "quote-presentation-ci" ]

env:
  CARGO_TERM_COLOR: always
  SGX: 1

jobs:
  build:
    runs-on: ubuntu-latest
    environment: tee
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    - name: azure-tee-build-${{ github.sha }}
      uses: appleboy/ssh-action@v1.0.3
      with:
         host: ${{ secrets.AZURE_TEE_BUILD_HOST }}
         username: ${{ secrets.AZURE_TEE_BUILD_USERNAME }}
         key: ${{ secrets.AZURE_TEE_BUILD_KEY }}
         port: ${{ secrets.SSH_PORT }}
         command_timeout: 10m
         script: |
            cd /tmp 
            source $HOME/.cargo/env
            git clone https://github.com/maceip/tlsn ${{ github.sha }}
            cd ${{ github.sha }}
            git checkout ${{ github.sha }}
            cd crates/notary/server/config/gramine
            random_port=$(shuf -i 1024-65535 -n 1)
            sed -i '/port*: *7047/s/7047/'$random_port'/' ../config.yaml
            make clean
            make
            : # start notary in tee, bg
            make start-gramine-server &
            : # if openssl cant dial the default port in 10 mins: ❌; else ✅
            SECONDS=0; set -o pipefail; while [ $SECONDS -lt 600 ]; do  echo -e "GET /info HTTP/1.1\r\nHost: localhost\r\nConnection: Close\r\n\r\n" |  openssl s_client -quiet -ignore_unexpected_eof localhost:$random_port 2>&1| tee s.log;  if [ $? -eq 0 ]; then AZURE_TEE_BUILD_PORT=`cat s.log`; echo "AZURE_TEE_BUILD_PORT=$(echo $AZURE_TEE_BUILD_PORT)" >> $GITHUB_ENV; exit 0; fi; sleep 2; done
    - run: echo "${{ env.AZURE_TEE_BUILD_PORT }}"
    - run: echo $env:AZURE_TEE_BUILD_PORT
    - name: save quote from azure into env, write it to runner
      run: echo "${{ env.AZURE_TEE_BUILD_PORT }}" > /home/runner/work/_temp/sgx-build-quote.txt
    - name: upload it
      uses: actions/upload-artifact@v4
      with:
        path: /home/runner/work/_temp/sgx-build-quote.txt
    - name: get github to sign our measurement
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: /home/runner/work/_temp/sgx-build-quote.txt
