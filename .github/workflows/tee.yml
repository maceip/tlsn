name: tee

on:
  push:
    branches: [ "quote-presentation-ci" ]
  pull_request:
    branches: [ "quote-presentation-ci" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    environment: tee
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: azure-demo ${{ github.sha }}
      uses: appleboy/ssh-action@v1.0.3
      with:
         host: ${{ secrets.AZURE_TEE_BUILD_HOST }}
         username: ${{ secrets.AZURE_TEE_BUILD_USERNAME }}
         key: ${{ secrets.AZURE_TEE_BUILD_KEY }}
         port: ${{ secrets.SSH_PORT }}
         command_timeout: 120m
         script: |
            cd /tmp 
            source $HOME/.cargo/env
            git clone https://github.com/maceip/tlsn ${{ github.sha }}
            cd ${{ github.sha }}
            git checkout ${{ github.sha }}
            cd crates/notary/server/config/gramine
            random_port=$(shuf -i 1024-65535 -n 1)
            SGX=1 make
            sed '/port*: *7047/s/7047/'$random_port'/' ../config.yaml
            : # start notary in tee, bg
            SGX=1 make start-gramine-server &
            : # if openssl cant dial the default port in 10 mins: ❌; else ✅
            SECONDS=0; while [ $SECONDS -lt 600 ]; do  echo -e "GET /info HTTP/1.1\r\nHost: localhost\r\nConnection: Close\r\n\r\n" |  openssl 2>&1 s_client -quiet -state -connect localhost:'$random_port' | tee s.log; if [ $? -eq 0 ]; then AZURE_TEE_BUILD_PORT=`cat s.log`; echo "AZURE_TEE_BUILD_PORT=$(echo $AZURE_TEE_BUILD_PORT)" >> $env:GITHUB_ENV; exit 0; fi; sleep 1; done
    - run: echo "${{ env.AZURE_TEE_BUILD_PORT }}"
    - run: echo $env:AZURE_TEE_BUILD_PORT
    - name: save quote from azure into env, write it to runner
      run: echo "${{ env.AZURE_TEE_BUILD_PORT }}" > /home/runner/work/_temp/sgx-build-quote.txt
    - name: upload it
      uses: actions/upload-artifact@v4
      with:
        path: /home/runner/work/_temp/notary-server.txt
    - name: get github to sign our measurement
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: /home/runner/work/_temp/sgx-build-quote.txt
