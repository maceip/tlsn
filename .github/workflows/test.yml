name: tee

on:
  push:
    branches: [ "quote-presentation-ci" ]
  pull_request:
    branches: [ "quote-presentation-ci" ]

env:
  CARGO_TERM_COLOR: always
  SGX: 1

jobs:
  build:
    runs-on: ubuntu-latest
    environment: tee
    steps:
    - name: azure-tee-build-${{ github.sha }}
      uses: appleboy/ssh-action@v1.0.3
      env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
         host: ${{ secrets.AZURE_TEE_BUILD_HOST }}
         username: ${{ secrets.AZURE_TEE_BUILD_USERNAME }}
         key: ${{ secrets.AZURE_TEE_BUILD_KEY }}
         port: ${{ secrets.SSH_PORT }}
         command_timeout: 10m
         envs: TOKEN
         allenvs: true
         script: |
            cd /tmp 
            source $HOME/.cargo/env
            git clone https://github.com/maceip/tlsn ${{ github.sha }}
            cd ${{ github.sha }}
            git checkout ${{ github.sha }}
            cd crates/notary/server/config/gramine
            SECONDS=0; set -o pipefail; while [ $SECONDS -lt 600 ]; do  echo -e "GET /info HTTP/1.1\r\nHost: localhost\r\nConnection: Close\r\n\r\n" |  openssl s_client -quiet -ignore_unexpected_eof localhost:7047 2>&1| tee s.log;  if [ $? -eq 0 ]; exit 0; fi; sleep 2; done
            RAWQUOTE=`cat s.log`
            curl -L \
              -X PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${GITHUB_REPOSITORY}/environments/tee/variables/AZURE_TEE_BUILD_PORT \
              -d '{"name":"AZURE_TEE_BUILD_PORT","value":"'$RAWQUOTE'"}'
    - run: echo "${{ env.AZURE_TEE_BUILD_PORT }}"
    - run: echo $env:AZURE_TEE_BUILD_PORT
    - name: save quote from azure into env, write it to runner
      run: echo "${{ env.AZURE_TEE_BUILD_PORT }}" > /home/runner/work/_temp/sgx-build-quote.txt
    - name: upload it
      uses: actions/upload-artifact@v4
      with:
        path: /home/runner/work/_temp/sgx-build-quote.txt
    - name: get github to sign our measurement
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: /home/runner/work/_temp/sgx-build-quote.txt
