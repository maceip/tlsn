name: tee-odd

on:
  push:
    branches: [ "quote-presentation-ci" ]
  pull_request:
    branches: [ "quote-presentation-ci" ]

permissions:
  id-token: write
  attestations: write
  
env:
  CARGO_TERM_COLOR: always
  SGX: 1

jobs:
  build:
    runs-on: ubuntu-latest
    environment: tee
    steps:
    - name: azure-tee-build-${{ github.sha }}
      uses: appleboy/ssh-action@v1.0.3
      env:
         PAT_TOKEN: ${{ secrets.PAT_SET_ENV }}

      with:
         host: ${{ secrets.AZURE_TEE_BUILD_HOST }}
         username: ${{ secrets.AZURE_TEE_BUILD_USERNAME }}
         key: ${{ secrets.AZURE_TEE_BUILD_KEY }}
         port: ${{ secrets.SSH_PORT }}
         command_timeout: 10m
         allenvs: true
         envs: PAT_TOKEN
         script: |
            cd /tmp/f8f2cb4ab8d4f13806563aa82b21af8c0422aeac 
            source $HOME/.cargo/env
            cd crates/notary/server/config/gramine
            random_port=$(shuf -i 1024-65535 -n 1)
            sed -i '/port*: *7047/s/7047/'$random_port'/' ../config.yaml
            make clean
            SGX=1 make start-gramine-server &
            notarypid=$!
            BINGO=0
            SECONDS=0; set -o pipefail; while [ $SECONDS -lt 19 ]; do echo -e "GET /info HTTP/1.1\r\nHost: localhost\r\nConnection: Close\r\n\r\n" | openssl s_client -quiet localhost:$random_port 2>&1 | tee s.log; if [ $? -eq 0 ]; then echo 'BBB'; BINGO=1; break; fi; sleep 2; done
            if [ $BINGO -eq 0 ]; then echo "Test Failed"; kill -SIGTERM $notarypid; exit 1; fi
            export RAWQUOTE=$(cat s.log | grep '^{' |  jq '. | tostring')
            curl -L -X PATCH -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $PAT_TOKEN" -H "Connection: close" -H "X-GitHub-Api-Version: 2022-11-28" https://api.github.com/repos/$GITHUB_REPOSITORY/environments/TEE/variables/AZURE_TEE_BUILD_PORT -d "{\"name\":\"AZURE_TEE_BUILD_PORT\",\"value\":$RAWQUOTE}"
            kill -SIGTERM $notarypid
            exit 0
    - name: save quote from azure into env, write it to runner
      run: echo "${{ vars.AZURE_TEE_BUILD_PORT }}" > /home/runner/work/_temp/sgx-build-quote.txt
    - name: upload it
      uses: actions/upload-artifact@v4
      with:
        path: /home/runner/work/_temp/sgx-build-quote.txt
    - name: get github to sign our measurement
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: /home/runner/work/_temp/sgx-build-quote.txt

 
